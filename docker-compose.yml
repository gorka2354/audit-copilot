services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: audit-copilot-pg
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
