name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv (+ Python 3.12)
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Ruff (lint + imports)
        run: uv run ruff check .

      - name: Mypy (strict)
        run: uv run mypy

      # Гейт метрик: recall + FP-rate реального движка через replay-fixtures, вхолодную
      # (без security-lab/LLM/сети). Регресс recall ниже базлайна валит сборку.
      - name: Eval gate (recall + FP-rate, cold via replay)
        run: uv run pytest tests/unit/test_recall_gate.py -q

      # Только unit: integration-тестам нужны Postgres/Ollama/Anthropic, которых в CI нет.
      - name: Pytest (unit)
        run: uv run pytest -m "not integration"
